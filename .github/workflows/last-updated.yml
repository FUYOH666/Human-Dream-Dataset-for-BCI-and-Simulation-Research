name: Update last modified date

on:
  push:
    branches: [main, master]

jobs:
  update-date:
    runs-on: ubuntu-latest
    # Skip if this workflow was triggered by its own commit (avoid loop)
    if: github.event.head_commit.message != 'chore: auto update last modified date'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update date in README
        run: |
          DATE=$(date +"%Y-%m-%d")
          sed -i.bak "s/Last updated: .*/Last updated: ${DATE}/" README.md
          rm -f README.md.bak

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (git commit -m "chore: auto update last modified date" && git push)
