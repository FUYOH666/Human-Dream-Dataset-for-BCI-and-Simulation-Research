name: Update last modified date

on:
  push:
    branches: [main, master]

jobs:
  # Always runs so workflow doesn't report "No jobs were run" when update-date is skipped
  check:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Workflow triggered"

  update-date:
    needs: check
    runs-on: ubuntu-latest
    # Skip if triggered by our own commit (avoid loop); skip if commit author is bot
    if: |
      github.event.head_commit.message != 'chore: auto update last modified date' &&
      github.event.head_commit.author.name != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update date in README
        run: |
          DATE=$(date +"%Y-%m-%d")
          sed -i.bak "s/Last updated: .*/Last updated: ${DATE}/" README.md
          rm -f README.md.bak

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (git commit -m "chore: auto update last modified date" && git push)
